schema_version: 1
kind: sdkwork.database.schema
module_id: prompts
contract_version: 1.0.0
owner_team: prompts-platform
compliance_level: L2
engines:
  - postgres
table_prefix: ai_
tables:
  - name: ai_prompt_category
    lifecycle_status: active
    owner: prompts-platform
    description: Tenant-scoped prompt template categories.
  - name: ai_prompt
    lifecycle_status: active
    owner: prompts-platform
    description: Prompt metadata keyed by prompt_key within tenant/org scope.
  - name: ai_prompt_version
    lifecycle_status: active
    owner: prompts-platform
    description: Versioned prompt body, variable schema, and model constraints.
  - name: ai_prompt_binding
    lifecycle_status: active
    owner: prompts-platform
    description: Binds prompt versions to owner entities such as agents or workflows.
  - name: ai_agent_prompt_template
    lifecycle_status: active
    owner: prompts-platform
    description: Agent marketplace reusable prompt templates (from kernel a_agent_prompt_template).
  - name: ai_prompt_usage_event
    lifecycle_status: active
    owner: prompts-platform
    description: Audit trail for prompt resolution, render, and catalog access.
