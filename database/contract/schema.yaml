schema_version: 1
kind: sdkwork.database.schema
module_id: prompts
contract_version: 1.0.0
owner_team: prompts-platform
compliance_level: L2
engines:
  - postgres
table_prefix: ai_
tables:
  - name: ai_prompt_category
    lifecycle_status: active
    owner: prompts-platform
    description: Tenant-scoped prompt categories.
  - name: ai_prompt
    lifecycle_status: active
    owner: prompts-platform
    description: Prompt definition metadata keyed by prompt_key.
  - name: ai_prompt_version
    lifecycle_status: active
    owner: prompts-platform
