    description: Binds prompt versions to runtime owners such as agents or workflows.
  - name: ai_prompt_template
    lifecycle_status: active
    owner: prompts-platform
    description: Reusable prompt template catalog for app and marketplace surfaces.
  - name: ai_prompt_usage
    lifecycle_status: active
    owner: prompts-platform
    description: Append-only audit log for prompt resolve, render, and catalog access.
