schema_version: 1
kind: sdkwork.database.schema
owner: sdkwork-prompts
domain: intelligence
capability: forum
module_prefix: forum
standard_version: "2026-06-12"
contract_status: implemented
compliance_level: L2
timezone: UTC

id_strategy:
  type: snowflake
  provider: sdkwork-appbase
  epoch: "2024-01-01T00:00:00Z"
  bits:
    timestamp_ms: 41
    node_id: 10
    sequence: 12
  min_required_lifetime_years: 30
  public_id: uuid

serialization:
  int64: string
  decimal: string
  time: iso8601_utc
  enum: string

principles:
  - All tenant-scoped tables carry tenant_id, organization_id, data_scope, created_at, updated_at, version, and status unless explicitly marked as integration log.
  - Prompts public terms are topic and reply.
  - Attachments reference Drive/media resources; forum does not own binary storage lifecycle.
  - Public projections are derived and rebuildable; source-of-truth tables remain under discussion, member, and moderation groups.

implementation_status:
  summary: "Service, repository, HTTP routes, database module, and worker jobs are implemented against PostgreSQL. Integration ports remain noop until external SDKs are wired."
  service_layer:
    - "Input validation for title, body, body_format, slug, name, node_type, target_type, decision_action, sanction_type, grant_mode, vote_value, reason_code"
    - "Limit normalization (1-100) for all paginated queries"
    - "Sort validation for topic listing"
    - "Empty/whitespace rejection for required string fields"
    - "Length limits (title <= 240, slug <= 120, name <= 160, code <= 64-80, label <= 80, reason_code <= 80, description <= 2000)"
    - "Slug normalization enforcement (lowercase, hyphens, no spaces)"
    - "Cycle prevention in node updates (node cannot be its own parent)"
    - "Board ID validation for topic prefix creation"
    - "Topic type validation (discussion, question, poll, announcement, article)"
    - "Visibility validation (public, members, private, unlisted)"
    - "Feed type validation (home, board, tag, member)"
    - "Poll option validation (no duplicates, max 50 options)"
    - "Sanction validation (user_id > 0, expires_at format)"
    - "Moderation case validation (target_id > 0)"
    - "Reputation rule validation (code/event_type length limits, daily_limit >= 0)"
    - "Trust level validation (level_no 0-10)"
    - "Badge validation (code/name length limits)"
    - "Audit action validation (action length, target_type enum)"
    - "Report validation (reason_code length, target_id > 0, description <= 2000)"
  repository_layer:
    status: implemented
    note: "SqlxPromptsRepository implements all PromptsRepository methods with PostgreSQL and snowflake ids via sdkwork-id-core."
  integration_ports:
    status: http_optional
    note: "Search and notification ports use HTTP adapters when SDKWORK_PROMPTS_SEARCH_URL / SDKWORK_PROMPTS_NOTIFICATION_URL are set; otherwise logging or noop adapters apply. Drive validation runs on attachment create."
  worker_jobs:
    status: implemented
    note: "PromptsWorker delegates to PromptsService for outbox publish, search projection rebuild, stats rebuild, and moderation queue scan. Notification fanout awaits NotificationPort wiring."
  remaining_implementation_todos: 4
  todo_categories:
    iam_integration: 2
    notification_fanout: 1
    external_search_index: 1
  note: "Remaining work is IAM access-token parsing and external integration ports (search index push, notification delivery)."

field_sets:
  tenant_entity:
    - { name: id, type: int64, required: true, description: "Database surrogate id." }
    - { name: uuid, type: uuid, required: true, description: "Stable external id." }
    - { name: tenant_id, type: int64, required: true, description: "Tenant isolation id from verified context." }
    - { name: organization_id, type: int64, required: true, description: "Organization isolation id; 0 means tenant-level." }
    - { name: data_scope, type: string(32), required: true, description: "Visibility boundary such as tenant, organization, user, public." }
    - { name: status, type: string(32), required: true, description: "Lifecycle status." }
    - { name: version, type: int64, required: true, description: "Optimistic lock version." }
    - { name: created_at, type: instant, required: true, description: "UTC creation time." }
    - { name: updated_at, type: instant, required: true, description: "UTC update time." }
    - { name: deleted_at, type: instant, required: false, description: "Soft delete time." }
    - { name: deleted_by, type: int64, required: false, description: "Actor that soft-deleted the row." }
  integration_log:
    - { name: id, type: int64, required: true, description: "Database surrogate id." }
    - { name: uuid, type: uuid, required: true, description: "Stable external id." }
    - { name: tenant_id, type: int64, required: true, description: "Tenant isolation id; 0 only for platform-shared messages." }
    - { name: organization_id, type: int64, required: true, description: "Organization isolation id." }
    - { name: status, type: string(32), required: true, description: "Processing status." }
    - { name: version, type: int64, required: true, description: "Optimistic lock version." }
    - { name: created_at, type: instant, required: true, description: "UTC creation time." }
    - { name: updated_at, type: instant, required: true, description: "UTC update time." }

tables:
  - name: prm_space
    group: taxonomy
    profile: tenant_entity
    owner: prompts.taxonomy
    description: "Top-level forum space, usually one public community or one tenant-scoped forum area."
    columns:
      - { name: code, type: string(64), required: true, description: "Tenant-unique space code." }
      - { name: slug, type: string(120), required: true, description: "Public route slug." }
      - { name: name, type: string(160), required: true, description: "Display name." }
      - { name: description, type: string(1000), required: false, description: "Short introduction." }
      - { name: visibility, type: string(32), required: true, description: "public, private, unlisted, archived." }
      - { name: default_locale, type: string(16), required: false, description: "Default locale for labels." }
      - { name: settings, type: json, required: true, schema: PromptsSpaceSettings, description: "Posting, moderation, and discovery settings." }
    constraints:
      - { name: uk_prm_space_tenant_code, type: unique, columns: [tenant_id, code] }
      - { name: uk_prm_space_tenant_slug, type: unique, columns: [tenant_id, slug] }
      - { name: uk_prm_space_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_space_tenant_status_updated, columns: [tenant_id, organization_id, status, updated_at] }
    lifecycle: "Soft delete after all boards are archived."
    implementation_todo: "[SERVICE] Slug normalization enforced in create_space. [REPO] Immutability check after first topic requires repository query. [IMPLEMENTED] check_space_has_topics() in repository."

  - name: prm_node
    group: taxonomy
    profile: tenant_entity
    owner: prompts.taxonomy
    description: "Tree node used for category and board navigation."
    columns:
      - { name: space_id, type: int64, required: true, references: prm_space.id, description: "Owning space." }
      - { name: parent_id, type: int64, required: false, references: prm_node.id, description: "Parent category or board node." }
      - { name: node_type, type: string(32), required: true, description: "category or board." }
      - { name: slug, type: string(120), required: true, description: "Sibling-unique route slug." }
      - { name: name, type: string(160), required: true, description: "Display name." }
      - { name: description, type: string(1000), required: false, description: "Node introduction." }
      - { name: path, type: string(1000), required: true, description: "Materialized id path for tree queries." }
      - { name: level_no, type: int32, required: true, description: "Tree level starting at 0." }
      - { name: sort_order, type: int32, required: true, description: "Sibling order." }
      - { name: icon_media_id, type: string(128), required: false, description: "Drive/media reference for icon." }
      - { name: cover_media_id, type: string(128), required: false, description: "Drive/media reference for cover." }
      - { name: settings, type: json, required: true, schema: PromptsNodeSettings, description: "Posting and moderation settings inherited by board profiles." }
    constraints:
      - { name: uk_prm_node_tenant_space_parent_slug, type: unique, columns: [tenant_id, space_id, parent_id, slug] }
      - { name: uk_prm_node_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_node_tenant_parent_status_sort, columns: [tenant_id, organization_id, parent_id, status, sort_order] }
      - { name: idx_prm_node_tenant_space_type_status, columns: [tenant_id, space_id, node_type, status, sort_order] }
    lifecycle: "Soft delete only when no active board profile or topic references the node."
    implementation_todo: "[SERVICE] Self-parent cycle prevention enforced. [REPO] Deep cycle detection requires repository tree query. [IMPLEMENTED] check_node_cycle() in repository."

  - name: prm_board_profile
    group: taxonomy
    profile: tenant_entity
    owner: prompts.taxonomy
    description: "Board-specific behavior for a prm_node whose node_type is board."
    columns:
      - { name: node_id, type: int64, required: true, references: prm_node.id, description: "Board node." }
      - { name: topic_create_mode, type: string(32), required: true, description: "open, trusted, moderated, closed." }
      - { name: reply_create_mode, type: string(32), required: true, description: "open, trusted, moderated, closed." }
      - { name: default_topic_sort, type: string(32), required: true, description: "latest, top, featured, created." }
      - { name: moderation_mode, type: string(32), required: true, description: "post, pre, hybrid." }
      - { name: attachment_policy, type: json, required: true, schema: PromptsAttachmentPolicy, description: "Allowed attachment types and limits." }
      - { name: board_rules, type: json, required: true, schema: PromptsBoardRules, description: "Rule blocks displayed to users." }
    constraints:
      - { name: uk_prm_board_profile_node, type: unique, columns: [tenant_id, node_id] }
      - { name: uk_prm_board_profile_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_board_profile_tenant_status_updated, columns: [tenant_id, organization_id, status, updated_at] }
    lifecycle: "Soft delete with the board node."
    implementation_todo: "[SERVICE] node_type enum validated in create_node. [REPO] Board profile insert requires node_type check in repository. [IMPLEMENTED] check_node_is_board() in repository."

  - name: prm_tag
    group: taxonomy
    profile: tenant_entity
    owner: prompts.taxonomy
    description: "Reusable topic tag."
    columns:
      - { name: space_id, type: int64, required: true, references: prm_space.id, description: "Owning space." }
      - { name: slug, type: string(120), required: true, description: "Public tag slug." }
      - { name: name, type: string(120), required: true, description: "Display name." }
      - { name: description, type: string(500), required: false, description: "Tag description." }
      - { name: color, type: string(32), required: false, description: "Display color token." }
      - { name: usage_count, type: int64, required: true, description: "Denormalized active topic count." }
    constraints:
      - { name: uk_prm_tag_tenant_space_slug, type: unique, columns: [tenant_id, space_id, slug] }
      - { name: uk_prm_tag_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_tag_tenant_usage, columns: [tenant_id, space_id, status, usage_count] }
    lifecycle: "Soft delete preserves historical topic tag relations."
    implementation_todo: "[REPO] Tag usage_count recomputation requires repository aggregate query. [IMPLEMENTED] update_tag_usage_count() in repository."

  - name: prm_topic_tag
    group: taxonomy
    profile: tenant_entity
    owner: prompts.taxonomy
    description: "Many-to-many relation between topics and tags."
    columns:
      - { name: topic_id, type: int64, required: true, references: prm_topic.id, description: "Tagged topic." }
      - { name: tag_id, type: int64, required: true, references: prm_tag.id, description: "Applied tag." }
      - { name: applied_by, type: int64, required: true, description: "Actor that applied the tag." }
    constraints:
      - { name: uk_prm_topic_tag_topic_tag, type: unique, columns: [tenant_id, topic_id, tag_id] }
      - { name: uk_prm_topic_tag_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_topic_tag_tenant_tag_created, columns: [tenant_id, tag_id, created_at, id] }
      - { name: idx_prm_topic_tag_tenant_topic, columns: [tenant_id, topic_id] }
    lifecycle: "Hard delete is allowed when removing a tag from a topic."
    implementation_todo: "[REPO] Tag usage counter sync requires repository transaction or outbox projection. [IMPLEMENTED] update_tag_usage_count() and insert_outbox_event() in repository."

  - name: prm_topic_prefix
    group: taxonomy
    profile: tenant_entity
    owner: prompts.taxonomy
    description: "Board-scoped topic prefix such as official, question, announcement, or guide."
    columns:
      - { name: board_id, type: int64, required: true, references: prm_node.id, description: "Board node id." }
      - { name: code, type: string(64), required: true, description: "Board-unique prefix code." }
      - { name: label, type: string(80), required: true, description: "Display label." }
      - { name: color, type: string(32), required: false, description: "Display color token." }
      - { name: sort_order, type: int32, required: true, description: "Display order." }
      - { name: required_trust_level, type: int32, required: false, description: "Minimum trust level to apply." }
    constraints:
      - { name: uk_prm_topic_prefix_board_code, type: unique, columns: [tenant_id, board_id, code] }
      - { name: uk_prm_topic_prefix_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_topic_prefix_tenant_board_status_sort, columns: [tenant_id, board_id, status, sort_order] }
    lifecycle: "Soft delete preserves historical topic display."
    implementation_todo: "[SERVICE] board_id validated as positive in create_topic_prefix. [REPO] Board existence check requires repository query. [IMPLEMENTED] check_board_exists() in repository."

  - name: prm_node_acl
    group: taxonomy
    profile: tenant_entity
    owner: prompts.security
    description: "Board/category ACL override for read, create, reply, moderate, and administer permissions."
    columns:
      - { name: node_id, type: int64, required: true, references: prm_node.id, description: "Node with ACL override." }
      - { name: principal_type, type: string(32), required: true, description: "role, group, user, trust_level, public." }
      - { name: principal_id, type: string(128), required: true, description: "Principal id in IAM or local trust-level namespace." }
      - { name: permission_code, type: string(120), required: true, description: "Permission such as prompts.topic.create." }
      - { name: effect, type: string(16), required: true, description: "allow or deny." }
      - { name: condition_json, type: json, required: false, schema: PromptsAclCondition, description: "Optional conditional policy." }
    constraints:
      - { name: uk_prm_node_acl_scope, type: unique, columns: [tenant_id, node_id, principal_type, principal_id, permission_code] }
      - { name: uk_prm_node_acl_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_node_acl_tenant_principal, columns: [tenant_id, principal_type, principal_id, status] }
      - { name: idx_prm_node_acl_tenant_node_permission, columns: [tenant_id, node_id, permission_code, status] }
    lifecycle: "Soft delete for auditability."
    implementation_todo: "[INTEGRATION] IAM role/group id resolution requires appbase SDK dependency."

  - name: prm_topic
    group: discussion
    profile: tenant_entity
    owner: prompts.discussion
    description: "Primary discussion topic."
    columns:
      - { name: space_id, type: int64, required: true, references: prm_space.id, description: "Owning space." }
      - { name: board_id, type: int64, required: true, references: prm_node.id, description: "Board node id." }
      - { name: author_user_id, type: int64, required: true, description: "Author user id from IAM/appbase." }
      - { name: author_profile_id, type: int64, required: false, references: prm_member_profile.id, description: "Prompts member profile snapshot owner." }
      - { name: prefix_id, type: int64, required: false, references: prm_topic_prefix.id, description: "Optional board prefix." }
      - { name: slug, type: string(180), required: false, description: "Optional stable public slug." }
      - { name: title, type: string(240), required: true, description: "Topic title." }
      - { name: body_format, type: string(32), required: true, description: "markdown, html_sanitized, rich_text_json." }
      - { name: body, type: text, required: true, description: "Current sanitized topic body." }
      - { name: body_excerpt, type: string(500), required: false, description: "Plain text excerpt for lists." }
      - { name: content_hash, type: string(128), required: true, description: "Hash for duplicate detection and idempotency." }
      - { name: topic_type, type: string(32), required: true, description: "discussion, question, poll, announcement, article." }
      - { name: moderation_status, type: string(32), required: true, description: "visible, pending, hidden, rejected, deleted." }
      - { name: visibility, type: string(32), required: true, description: "public, members, private, unlisted." }
      - { name: pinned_at, type: instant, required: false, description: "Board pin time." }
      - { name: pinned_until, type: instant, required: false, description: "Pin expiry." }
      - { name: featured_at, type: instant, required: false, description: "Feature time." }
      - { name: locked_at, type: instant, required: false, description: "Reply lock time." }
      - { name: locked_by, type: int64, required: false, description: "Actor that locked topic." }
      - { name: last_reply_id, type: int64, required: false, references: prm_topic_reply.id, description: "Latest visible reply id." }
      - { name: last_activity_at, type: instant, required: true, description: "Topic or reply activity time." }
      - { name: accepted_reply_id, type: int64, required: false, references: prm_topic_reply.id, description: "Accepted answer reply for question topics." }
      - { name: attachment_count, type: int32, required: true, description: "Denormalized attachment count." }
      - { name: metadata, type: json, required: true, schema: PromptsTopicMetadata, description: "Extensible metadata without ownership leakage." }
    constraints:
      - { name: uk_prm_topic_uuid, type: unique, columns: [uuid] }
      - { name: uk_prm_topic_board_slug, type: unique, columns: [tenant_id, board_id, slug], nullable_columns: [slug] }
    indexes:
      - { name: idx_prm_topic_tenant_board_status_activity, columns: [tenant_id, board_id, moderation_status, last_activity_at, id] }
      - { name: idx_prm_topic_tenant_author_updated, columns: [tenant_id, author_user_id, updated_at, id] }
      - { name: idx_prm_topic_tenant_featured, columns: [tenant_id, featured_at, id] }
      - { name: idx_prm_topic_tenant_pinned, columns: [tenant_id, board_id, pinned_at, id] }
    lifecycle: "Soft delete and preserve revisions for audit and moderation."
    implementation_todo: "[SERVICE] title/body length and emptiness validated. [REPO] Revision creation and content_hash generation require repository transaction. [IMPLEMENTED] get_next_revision_no() in repository."

  - name: prm_topic_revision
    group: discussion
    profile: tenant_entity
    owner: prompts.discussion
    description: "Immutable topic edit history."
    columns:
      - { name: topic_id, type: int64, required: true, references: prm_topic.id, description: "Revised topic." }
      - { name: revision_no, type: int32, required: true, description: "Sequential revision number per topic." }
      - { name: editor_user_id, type: int64, required: true, description: "Editor user id." }
      - { name: title, type: string(240), required: true, description: "Title at revision." }
      - { name: body_format, type: string(32), required: true, description: "Body format at revision." }
      - { name: body, type: text, required: true, description: "Body at revision." }
      - { name: edit_reason, type: string(500), required: false, description: "Optional edit reason." }
      - { name: content_hash, type: string(128), required: true, description: "Revision content hash." }
    constraints:
      - { name: uk_prm_topic_revision_topic_no, type: unique, columns: [tenant_id, topic_id, revision_no] }
      - { name: uk_prm_topic_revision_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_topic_revision_tenant_topic_created, columns: [tenant_id, topic_id, created_at, id] }
    lifecycle: "Append-only; do not soft delete except for legal erasure workflow."
    implementation_todo: "[REPO] Redaction workflow requires repository body masking. [IMPLEMENTED] SQL pattern for UPDATE prm_topic_revision SET body = '***REDACTED***' in repository."

  - name: prm_topic_reply
    group: discussion
    profile: tenant_entity
    owner: prompts.discussion
    description: "Reply to a forum topic, with optional parent reply for nested display."
    columns:
      - { name: topic_id, type: int64, required: true, references: prm_topic.id, description: "Owning topic." }
      - { name: board_id, type: int64, required: true, references: prm_node.id, description: "Denormalized board id for filtering." }
      - { name: parent_reply_id, type: int64, required: false, references: prm_topic_reply.id, description: "Parent reply for nested discussion." }
      - { name: author_user_id, type: int64, required: true, description: "Author user id." }
      - { name: author_profile_id, type: int64, required: false, references: prm_member_profile.id, description: "Author forum profile." }
      - { name: reply_no, type: int32, required: true, description: "Sequential visible reply number per topic." }
      - { name: body_format, type: string(32), required: true, description: "markdown, html_sanitized, rich_text_json." }
      - { name: body, type: text, required: true, description: "Current sanitized reply body." }
      - { name: body_excerpt, type: string(500), required: false, description: "Plain text excerpt." }
      - { name: content_hash, type: string(128), required: true, description: "Hash for duplicate detection." }
      - { name: moderation_status, type: string(32), required: true, description: "visible, pending, hidden, rejected, deleted." }
      - { name: accepted_at, type: instant, required: false, description: "Accepted answer time." }
      - { name: accepted_by, type: int64, required: false, description: "Actor that accepted answer." }
      - { name: attachment_count, type: int32, required: true, description: "Denormalized attachment count." }
      - { name: metadata, type: json, required: true, schema: PromptsReplyMetadata, description: "Extensible metadata." }
    constraints:
      - { name: uk_prm_topic_reply_topic_no, type: unique, columns: [tenant_id, topic_id, reply_no] }
      - { name: uk_prm_topic_reply_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_topic_reply_tenant_topic_status_created, columns: [tenant_id, topic_id, moderation_status, created_at, id] }
      - { name: idx_prm_topic_reply_tenant_author_updated, columns: [tenant_id, author_user_id, updated_at, id] }
      - { name: idx_prm_topic_reply_tenant_parent, columns: [tenant_id, parent_reply_id, created_at, id] }
    lifecycle: "Soft delete; preserve reply_no and revisions."
    implementation_todo: "[REPO] Revision creation and topic last_activity_at update require repository transaction. [IMPLEMENTED] get_next_revision_no() and get_next_reply_no() with SQL patterns in repository."

  - name: prm_reply_revision
    group: discussion
    profile: tenant_entity
    owner: prompts.discussion
    description: "Immutable reply edit history."
    columns:
      - { name: reply_id, type: int64, required: true, references: prm_topic_reply.id, description: "Revised reply." }
      - { name: topic_id, type: int64, required: true, references: prm_topic.id, description: "Owning topic." }
      - { name: revision_no, type: int32, required: true, description: "Sequential revision number per reply." }
      - { name: editor_user_id, type: int64, required: true, description: "Editor user id." }
      - { name: body_format, type: string(32), required: true, description: "Body format at revision." }
      - { name: body, type: text, required: true, description: "Body at revision." }
      - { name: edit_reason, type: string(500), required: false, description: "Optional edit reason." }
      - { name: content_hash, type: string(128), required: true, description: "Revision content hash." }
    constraints:
      - { name: uk_prm_reply_revision_reply_no, type: unique, columns: [tenant_id, reply_id, revision_no] }
      - { name: uk_prm_reply_revision_uuid, type: unique, columns: [uuid] }
    indexes:
      - { name: idx_prm_reply_revision_tenant_reply_created, columns: [tenant_id, reply_id, created_at, id] }
    lifecycle: "Append-only; use legal redaction for restricted content."
    implementation_todo: "[REPO] Editor context snapshot requires repository operator metadata. [IMPLEMENTED] SQL pattern for INSERT INTO prm_reply_revision with editor_user_id in repository."

  - name: prm_attachment
    group: discussion
    profile: tenant_entity
    owner: prompts.discussion
    description: "Attachment reference bound to a topic or reply."
    columns:
      - { name: owner_type, type: string(32), required: true, description: "topic or reply." }
      - { name: owner_id, type: int64, required: true, description: "Topic id or reply id." }
      - { name: drive_space_id, type: string(128), required: true, description: "Drive space reference." }
      - { name: drive_node_id, type: string(128), required: true, description: "Drive node reference." }
      - { name: media_resource_id, type: string(128), required: false, description: "MediaResource id when available." }
