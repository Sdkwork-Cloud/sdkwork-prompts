schemaVersion: 1
kind: sdkwork.job.queue
owner: sdkwork-prompts
domain: intelligence
capability: forum
queues:
  - name: forum-outbox
    consumer: PublishOutbox
    description: "Publish prm_outbox_event rows with retry and dead-letter handling. Polls pending events, applies exponential backoff, and moves permanently failed events to dead-letter after max retries."
    retry:
      maxAttempts: 5
      backoffMs: [1000, 5000, 15000, 60000, 300000]
    deadLetter: forum-outbox-dlq
  - name: forum-notifications
    consumer: FanoutNotifications
    description: "Resolve subscriptions/preferences and enqueue provider commands. Reads subscription targets, merges notification preferences, and dispatches to configured delivery channels."
    retry:
      maxAttempts: 3
      backoffMs: [2000, 10000, 60000]
  - name: forum-moderation-policy
    consumer: EvaluateModerationPolicy
    description: "Evaluate moderation policies and create queue items idempotently. Matches content against active prm_moderation_policy rules and creates prm_moderation_queue_item entries."
    retry:
      maxAttempts: 3
      backoffMs: [1000, 5000, 30000]
