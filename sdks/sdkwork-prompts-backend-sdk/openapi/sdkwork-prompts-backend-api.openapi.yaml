openapi: 3.1.2
info:
  title: SDKWork Prompts Backend API
  version: 0.1.0
  summary: Operator backend API for prompt governance (ai_prompt tables).
servers:
  - url: /backend/v3/api
tags:
  - name: prompts-admin
paths:
  /prompts:
    get:
      tags: [prompts-admin]
      operationId: prompts.admin.definitions.list
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt
      x-sdkwork-permission: prompts.admin.templates.read
      x-sdkwork-auth-mode: dual-token
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: q
          in: query
          schema: { type: string }
        - name: prompt_type
          in: query
          schema: { type: string }
        - name: visibility
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: category_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Admin prompt list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefinitionsListResult"
        default:
          $ref: "#/components/responses/Problem"
    post:
      tags: [prompts-admin]
      operationId: prompts.admin.definitions.create
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt
      x-sdkwork-permission: prompts.admin.templates.create
      x-sdkwork-auth-mode: dual-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPromptCreateRequest"
      responses:
        "201":
          description: Created prompt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefinitionsCreateResult"
        default:
          $ref: "#/components/responses/Problem"
  /prompts/{promptId}/versions:
    get:
      tags: [prompts-admin]
      operationId: prompts.admin.versions.list
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt_version
      x-sdkwork-permission: prompts.admin.templates.read
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/PromptId"
      responses:
        "200":
          description: Prompt version list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionsListResult"
        default:
          $ref: "#/components/responses/Problem"
    post:
      tags: [prompts-admin]
      operationId: prompts.admin.versions.create
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt_version
      x-sdkwork-permission: prompts.admin.templates.create
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/PromptId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPromptVersionCreateRequest"
      responses:
        "201":
          description: Created version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionsCreateResult"
        default:
          $ref: "#/components/responses/Problem"
  /prompts/versions/{versionId}/publish:
    post:
      tags: [prompts-admin]
      operationId: prompts.admin.versions.publish
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt_version
      x-sdkwork-permission: prompts.admin.templates.publish
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Published version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionsPublishResult"
        default:
          $ref: "#/components/responses/Problem"
  /prompts/versions/{versionId}/render:
    post:
      tags: [prompts-admin]
      operationId: prompts.admin.versions.render
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt_version
      x-sdkwork-permission: prompts.admin.templates.render
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPromptRenderRequest"
      responses:
        "200":
          description: Rendered prompt text.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionRendersCreateResult"
        default:
          $ref: "#/components/responses/Problem"
  /prompts/{promptId}/bindings:
    get:
      tags: [prompts-admin]
      operationId: prompts.admin.bindings.list
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt_binding
      x-sdkwork-permission: prompts.admin.bindings.read
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/PromptId"
      responses:
        "200":
          description: Binding list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefinitionBindingsListResult"
        default:
          $ref: "#/components/responses/Problem"
    post:
      tags: [prompts-admin]
      operationId: prompts.admin.bindings.create
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt_binding
      x-sdkwork-permission: prompts.admin.bindings.create
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/PromptId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPromptBindingCreateRequest"
      responses:
        "201":
          description: Created binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefinitionBindingsCreateResult"
        default:
          $ref: "#/components/responses/Problem"
  /prompts/bindings/{bindingId}:
    put:
      tags: [prompts-admin]
      operationId: prompts.admin.bindings.update
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-owner: sdkwork-prompts
      x-sdkwork-api-authority: sdkwork-prompts-backend-api
      x-sdkwork-api-surface: backend-api
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-domain: intelligence
      x-sdkwork-resource: ai_prompt_binding
      x-sdkwork-permission: prompts.admin.bindings.update
      x-sdkwork-auth-mode: dual-token
      parameters:
        - $ref: "#/components/parameters/BindingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPromptBindingUpdateRequest"
      responses:
        "200":
          description: Updated binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefinitionBindingsUpdateResult"
        default:
          $ref: "#/components/responses/Problem"
components:
  securitySchemes:
    AuthToken:
      type: http
      scheme: bearer
    AccessToken:
      type: http
      scheme: bearer
  parameters:
    PromptId:
      name: promptId
      in: path
      required: true
      schema: { type: string }
    VersionId:
      name: versionId
      in: path
      required: true
      schema: { type: string }
    BindingId:
      name: bindingId
      in: path
      required: true
      schema: { type: string }
  responses:
    Problem:
      description: Problem response.
      content:
        application/json:
          schema:
            type: object
  schemas:
    PlusApiEnvelope:
      type: object
      required: [code]
      properties:
        code: { type: string }
        msg: { type: string }
    AdminPromptItem:
      type: object
      required: [id, uuid, tenantId, organizationId, promptKey, name, promptType, visibility, status, tags, createdAt, updatedAt]
      properties:
        id: { type: string }
        uuid: { type: string }
        tenantId: { type: string }
        organizationId: { type: string }
        promptKey: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        categoryId: { type: string, nullable: true }
        categoryCode: { type: string, nullable: true }
        promptType: { type: string }
        visibility: { type: string }
        status: { type: string }
        tags:
          type: array
          items: { type: string }
        ownerUserId: { type: string, nullable: true }
        latestVersionId: { type: string, nullable: true }
        publishedVersionId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AdminPromptVersionItem:
      type: object
      required: [id, uuid, tenantId, organizationId, promptId, versionNo, title, content, lifecycleStatus, reviewStatus, createdAt, updatedAt]
      properties:
        id: { type: string }
        uuid: { type: string }
        tenantId: { type: string }
        organizationId: { type: string }
        promptId: { type: string }
        versionNo: { type: string }
        title: { type: string }
        content: { type: string }
        lifecycleStatus: { type: string }
        reviewStatus: { type: string }
        checksumHash: { type: string }
        variableSchema: { type: object }
        outputSchema: { type: object }
        modelConstraints: { type: object }
        safetyPolicy: { type: object }
        examplesJson: { type: array, items: { type: object } }
        createdBy: { type: string }
        publishedAt: { type: string, format: date-time, nullable: true }
        reviewComment: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AdminPromptBindingItem:
      type: object
      required: [id, uuid, tenantId, organizationId, promptId, ownerType, ownerId, bindingRole, priority, enabled, createdAt, updatedAt]
      properties:
        id: { type: string }
        uuid: { type: string }
        tenantId: { type: string }
        organizationId: { type: string }
        promptId: { type: string }
        promptVersionId: { type: string, nullable: true }
        ownerType: { type: string }
        ownerId: { type: string }
        bindingRole: { type: string }
        priority: { type: integer }
        enabled: { type: boolean }
        policyJson: { type: object }
        snapshotJson: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DefinitionsListResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/AdminPromptItem"
    DefinitionsCreateResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: "#/components/schemas/AdminPromptItem"
    VersionsListResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/AdminPromptVersionItem"
    VersionsCreateResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: "#/components/schemas/AdminPromptVersionItem"
    VersionsPublishResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: "#/components/schemas/AdminPromptVersionItem"
    VersionRendersCreateResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                rendered: { type: string }
    DefinitionBindingsListResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/AdminPromptBindingItem"
    DefinitionBindingsCreateResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: "#/components/schemas/AdminPromptBindingItem"
    DefinitionBindingsUpdateResult:
      allOf:
        - $ref: "#/components/schemas/PlusApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: "#/components/schemas/AdminPromptBindingItem"
    AdminPromptCreateRequest:
      type: object
      required: [promptKey, name]
      properties:
        promptKey: { type: string }
        name: { type: string }
        description: { type: string }
        categoryId: { type: string }
        promptType: { type: string }
        visibility: { type: string }
        tags:
          type: array
          items: { type: string }
    AdminPromptVersionCreateRequest:
      type: object
      required: [versionNo, title, content]
      properties:
        versionNo: { type: string }
        title: { type: string }
        content: { type: string }
        variableSchema: { type: object }
        outputSchema: { type: object }
        modelConstraints: { type: object }
        safetyPolicy: { type: object }
        examplesJson: { type: array }
    AdminPromptRenderRequest:
      type: object
      properties:
        variables: { type: object }
    AdminPromptBindingCreateRequest:
      type: object
      required: [ownerType, ownerId, bindingRole]
      properties:
        promptVersionId: { type: string }
        ownerType: { type: string }
        ownerId: { type: integer, format: int64 }
        bindingRole: { type: string }
        priority: { type: integer }
        enabled: { type: boolean }
        policyJson: { type: object }
    AdminPromptBindingUpdateRequest:
      type: object
      properties:
        promptVersionId: {}
        ownerType: { type: string }
        ownerId: { type: integer, format: int64 }
        bindingRole: { type: string }
        priority: { type: integer }
        enabled: { type: boolean }
        policyJson: { type: object }
