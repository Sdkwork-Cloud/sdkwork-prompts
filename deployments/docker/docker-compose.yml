services:
  prompts-api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      SDKWORK_PROMPTS_DATABASE_URL: postgres://prompts:prompts@postgres:5432/prompts
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: prompts
      POSTGRES_USER: prompts
      POSTGRES_PASSWORD: prompts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
