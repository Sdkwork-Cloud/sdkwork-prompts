services:
  forum-api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      SDKWORK_PROMPTS_DATABASE_URL: postgres://forum:forum@postgres:5432/forum
      SDKWORK_PROMPTS_SEARCH_URL: http://search:9200
      SDKWORK_PROMPTS_DRIVE_URL: http://drive:8080
    depends_on:
      - postgres
      - search

  forum-worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.worker
    environment:
      RUST_LOG: info
      SDKWORK_PROMPTS_DATABASE_URL: postgres://forum:forum@postgres:5432/forum
      SDKWORK_PROMPTS_SEARCH_URL: http://search:9200
      SDKWORK_PROMPTS_DRIVE_URL: http://drive:8080
    depends_on:
      - postgres
      - search

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: forum
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  search:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
    ports:
      - "9200:9200"
    volumes:
      - search_data:/usr/share/opensearch/data

volumes:
  postgres_data:
  search_data:
